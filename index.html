<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta CNPJ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Consulta de CNPJ</h2>
        <div class="search-box">
            <input type="text" id="cnpjInput" placeholder="Digite o CNPJ (apenas números)">
            <button class="btn-search" onclick="consultarCNPJ()">Consultar</button>
        </div>
        <div id="resultado"></div>
        <button id="pdfBtn" class="btn-pdf" onclick="gerarPDF()">Gerar PDF</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
